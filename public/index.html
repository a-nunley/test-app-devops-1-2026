<!DOCTYPE html>
<html>
<head>
<title>George Dev Game Manager</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h1>George Dev Game Manager</h1>
<p>Created by Alexander Nunley</p>

<h3>Add Game</h3>

<form id="gameForm">
<input id="gameName" class="form-control mb-2" placeholder="Game Name" required>
<input id="gameURL" class="form-control mb-2" placeholder="Game URL" required>
<input id="gameAuthor" class="form-control mb-2" placeholder="Author" required>

<button class="btn btn-primary">Add Game</button>
</form>

<hr>

<h3>Saved Games</h3>

<div id="gamesList"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="js/games.js"></script>

</body>
</html>
