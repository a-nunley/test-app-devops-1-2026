<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student CRUD MVC App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.0/themes/base/jquery-ui.min.css">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="text-center mb-4">
      <h1>Student CRUD MVC App</h1>
      <p class="text-muted">Created by Alexander Nunley</p>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header">
            <h5 class="mb-0">Add Student</h5>
          </div>
          <div class="card-body">
            <form id="addStudentForm">
              <div class="mb-3">
                <label for="name" class="form-label">Student Name</label>
                <input type="text" id="name" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="age" class="form-label">Age</label>
                <input type="number" id="age" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="grade" class="form-label">Grade</label>
                <input type="text" id="grade" class="form-control" placeholder="A, B+, C, etc." required>
              </div>

              <button type="submit" class="btn btn-primary">Add Student</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header">
            <h5 class="mb-0">Update Student</h5>
          </div>
          <div class="card-body">
            <form id="updateStudentForm">
              <div class="mb-3">
                <label for="updateId" class="form-label">Student ID</label>
                <input type="text" id="updateId" class="form-control" readonly required>
              </div>

              <div class="mb-3">
                <label for="updateName" class="form-label">Student Name</label>
                <input type="text" id="updateName" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="updateAge" class="form-label">Age</label>
                <input type="number" id="updateAge" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="updateGrade" class="form-label">Grade</label>
                <input type="text" id="updateGrade" class="form-control" required>
              </div>

              <button type="submit" class="btn btn-warning">Update Student</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div id="messages" class="mb-4"></div>

    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Student Records</h5>
        <button type="button" id="refreshBtn" class="btn btn-info btn-sm">Refresh</button>
      </div>
      <div class="card-body">
        <div id="studentsList">
          <p class="text-muted">Loading students...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.14.0/jquery-ui.min.js"></script>
  <script src="js/students.js"></script>
  <script>
    $('#refreshBtn').on('click', function () {
      loadStudents();
    });
  </script>
</body>
</html>
